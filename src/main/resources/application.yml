spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:rate_limiter_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      timeout: 200ms

# Moved OUT of the spring block
rate:
  limiter:
    mode: redis   # Now matches @ConditionalOnProperty(name = "rate.limiter.mode")

# Moved OUT of the spring block
resilience4j:
  circuitbreaker:
    instances:
      redisRateLimiter:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        sliding-window-size: 10
        minimum-number-of-calls: 5